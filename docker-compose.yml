# ============================================
# DOCKER COMPOSE - STACK COMPLETO SCRAPINGWEB
# Sistema de Web Scraping y Análisis de Reseñas
# ============================================

name: scrapingweb

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL
  # ==========================================
  db:
    container_name: scrapingweb_db
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scrapingweb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scrapingweb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS - BROKER PARA CELERY
  # ==========================================
  redis:
    container_name: scrapingweb_redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - scrapingweb_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND FASTAPI
  # ==========================================
  backend:
    container_name: scrapingweb_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
      - ./backend/exports:/app/exports
    environment:
      # Database
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Python
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scrapingweb_network

  # ==========================================
  # CELERY WORKER - PROCESAMIENTO ASÍNCRONO
  # ==========================================
  celery_worker:
    container_name: scrapingweb_celery_worker
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: []
    command: ["celery", "-A", "app.workers.queue", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
      - db
      - backend
    networks:
      - scrapingweb_network

  # ==========================================
  # CELERY BEAT - SCHEDULER
  # ==========================================
  celery_beat:
    container_name: scrapingweb_celery_beat
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: []
    command: ["celery", "-A", "app.workers.queue", "beat", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
      - db
      - backend
    networks:
      - scrapingweb_network

  # ==========================================
  # FRONTEND NEXT.JS
  # ==========================================
  frontend:
    container_name: scrapingweb_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Código fuente montado para hot-reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - scrapingweb_network

  # ==========================================
  # PGADMIN - ADMINISTRACIÓN DE BASE DE DATOS
  # ==========================================
  pgadmin:
    container_name: scrapingweb_pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scrapingweb.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - scrapingweb_network

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    name: scrapingweb_postgres_data
    driver: local
  pgadmin_data:
    name: scrapingweb_pgadmin_data
    driver: local

# ==========================================
# RED COMPARTIDA
# ==========================================
networks:
  scrapingweb_network:
    name: scrapingweb_network
    driver: bridge
