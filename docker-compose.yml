# ============================================
# DOCKER COMPOSE - STACK COMPLETO SCRAPINGWEB
# Sistema de Web Scraping y Análisis de Reseñas
# ============================================

name: scrapingweb

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL
  # ==========================================
  db:
    container_name: scrapingweb_db
    image: postgres:16-alpine
    restart: "no"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scrapingweb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scrapingweb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND FASTAPI
  # ==========================================
  backend:
    container_name: scrapingweb_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: "no"
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8010", "--reload"]
    ports:
      - "8010:8010"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
      - ./backend/exports:/app/exports
    environment:
      # Database
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      # Python
      PYTHONUNBUFFERED: "1"
      # Scheduler (scrapping)
      SCRAPPING_SCHEDULE_DAY: "sun"
      SCRAPPING_SCHEDULE_HOUR: "22"
      SCRAPPING_SCHEDULE_MINUTE: "0"
      SCRAPPING_SCHEDULE_TIMEZONE: "America/Bogota"
      SCRAPPING_RUN_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scrapingweb_network

  # ==========================================
  # FRONTEND VITE + REACT
  # ==========================================
  frontend:
    container_name: scrapingweb_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8010}
    restart: "no"
    ports:
      - "3000:80"
    volumes:
      # Código fuente montado para hot-reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      NODE_ENV: production
      PORT: "3000"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8010}
    depends_on:
      - backend
    networks:
      - scrapingweb_network

  # ==========================================
  # PGADMIN - ADMINISTRACIÓN DE BASE DE DATOS
  # ==========================================
  pgadmin:
    container_name: scrapingweb_pgadmin
    image: dpage/pgadmin4:latest
    restart: "no"
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - scrapingweb_network

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    name: scrapingweb_postgres_data
    driver: local
  pgadmin_data:
    name: scrapingweb_pgadmin_data
    driver: local

# ==========================================
# RED COMPARTIDA
# ==========================================
networks:
  scrapingweb_network:
    name: scrapingweb_network
    driver: bridge
