services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: scrapingweb_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrapingweb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scrapingweb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrapingweb_network

  # Redis (para Celery)
  redis:
    image: redis:7-alpine
    container_name: scrapingweb_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrapingweb_network

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrapingweb_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./backend/exports:/app/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scrapingweb_network
    restart: unless-stopped

  # Celery Worker (procesamiento en background)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrapingweb_celery_worker
    command: celery -A app.workers.queue worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
      - backend
    networks:
      - scrapingweb_network
    restart: unless-stopped

  # Celery Beat (scheduler para scraping diario)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrapingweb_celery_beat
    command: celery -A app.workers.queue beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrapingweb}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
      - backend
    networks:
      - scrapingweb_network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000
    container_name: scrapingweb_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - scrapingweb_network
    restart: unless-stopped

  # pgAdmin (opcional - administración de BD)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scrapingweb_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scrapingweb.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - scrapingweb_network
    restart: unless-stopped

networks:
  scrapingweb_network:
    driver: bridge
    name: scrapingweb_network

volumes:
  postgres_data:
  pgadmin_data:
